<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contra 记账系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --navy:#1a2e4a; --blue:#2563eb; --cyan:#0ea5e9;
  --green:#16a34a; --red:#dc2626; --amber:#d97706;
  --bg:#f0f4f9; --card:#fff; --border:#e2e8f0;
  --text:#0f172a; --muted:#64748b; --inp:#1d4ed8;
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

/* ─── HEADER ─── */
.hdr{background:var(--navy);height:54px;padding:0 20px;display:flex;align-items:center;
  gap:14px;position:sticky;top:0;z-index:300;box-shadow:0 2px 12px rgba(0,0,0,.4);}
.brand{font-size:17px;font-weight:800;color:#fff;letter-spacing:.5px;white-space:nowrap;
  display:flex;align-items:center;gap:8px;}
.brand-ico{width:30px;height:30px;background:var(--blue);border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:15px;}

/* ─── TABS ─── */
.tab-bar{display:flex;align-items:center;gap:4px;flex:1;overflow-x:auto;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.25) transparent;padding:0 2px;}
.tab-bar::-webkit-scrollbar{height:3px;}
.tab-bar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.3);border-radius:2px;}
.tab{display:flex;align-items:center;gap:0;background:rgba(255,255,255,.1);
  border:1.5px solid transparent;border-radius:7px;padding:0 4px 0 12px;
  white-space:nowrap;cursor:pointer;min-width:90px;transition:all .15s;}
.tab:hover{background:rgba(255,255,255,.18);}
.tab.active{background:var(--blue);border-color:#60a5fa;}
.tab-name{background:transparent;border:none;color:rgba(255,255,255,.72);
  font-size:13px;font-weight:600;cursor:pointer;min-width:60px;max-width:110px;
  font-family:inherit;height:32px;padding:0;}
.tab.active .tab-name{color:#fff;}
.tab-name:focus{outline:none;color:#fff;}
.tab-x{background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;
  padding:4px 6px;border-radius:4px;font-size:15px;line-height:1;}
.tab-x:hover{color:#fca5a5;background:rgba(220,38,38,.2);}
.tab-new{background:rgba(255,255,255,.1);border:1.5px dashed rgba(255,255,255,.3);
  color:rgba(255,255,255,.7);border-radius:7px;padding:0 14px;height:32px;
  cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;font-family:inherit;
  transition:all .15s;}
.tab-new:hover{background:rgba(255,255,255,.2);color:#fff;border-color:var(--cyan);}

/* ─── HDR BUTTONS ─── */
.hbtn{height:32px;padding:0 14px;border:none;border-radius:7px;cursor:pointer;
  font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;
  white-space:nowrap;transition:filter .15s;font-family:inherit;}
.hbtn:hover{filter:brightness(1.12);}
.hbtn-save{background:var(--green);color:#fff;}
.hbtn-cust{background:var(--cyan);color:#fff;}
.hbtn-dl{background:#7c3aed;color:#fff;position:relative;}
.dl-menu{display:none;position:absolute;top:38px;right:0;background:#1a1040;
  border:1px solid rgba(255,255,255,.22);border-radius:9px;z-index:600;
  min-width:170px;box-shadow:0 6px 20px rgba(0,0,0,.55);padding:5px 0;white-space:nowrap;}
.dl-menu.open{display:block;}
.dlitem{padding:9px 16px;color:rgba(255,255,255,.85);font-size:12px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:8px;}
.dlitem:hover{background:rgba(255,255,255,.1);color:#fff;}
.dlitem-sep{height:1px;background:rgba(255,255,255,.1);margin:4px 0;}

/* ─── CONTRA TOOLBAR ─── */
.cbar{background:#1e3a5f;padding:8px 20px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.1);}
.cbar-left{display:flex;align-items:center;gap:10px;}
.cpill{display:flex;align-items:center;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);border-radius:7px;overflow:hidden;}
.clbl{padding:0 10px;font-size:11px;color:rgba(255,255,255,.55);
  border-right:1px solid rgba(255,255,255,.15);height:34px;display:flex;align-items:center;white-space:nowrap;}
.cinp{background:transparent;border:none;color:#fff;padding:0 10px;
  font-size:13px;font-weight:600;text-align:center;height:34px;width:76px;font-family:inherit;}
.cinp[type=date]{width:138px;}
.cinp:focus{outline:none;background:rgba(255,255,255,.08);}

/* ─── SUMMARY BAR ─── */
.sumbar{background:#fff;border-bottom:1px solid var(--border);padding:0 20px;
  display:flex;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.stile{padding:12px 24px;border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:145px;}
.stile:last-child{border-right:none;}
.slbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;
  color:var(--muted);margin-bottom:3px;}
.sval{font-size:19px;font-weight:800;color:var(--navy);}
.sval.pos{color:var(--green);}
.sval.neg{color:var(--red);}
.sval.amber{color:var(--amber);}

/* ─── MAIN ─── */
.main{padding:18px 20px;max-width:1320px;margin:0 auto;}

/* ─── CUSTOMER CARD ─── */
.card{background:var(--card);border-radius:12px;margin-bottom:18px;
  box-shadow:0 1px 8px rgba(0,0,0,.08);border:1px solid var(--border);overflow:hidden;}
.chdr{background:var(--navy);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.cname{background:transparent;border:1.5px solid transparent;color:#fff;
  font-size:15px;font-weight:700;padding:3px 8px;border-radius:6px;
  font-family:inherit;min-width:150px;}
.cname:hover{border-color:rgba(255,255,255,.3);}
.cname:focus{outline:none;border-color:var(--cyan);background:rgba(255,255,255,.08);}
.chdr-right{display:flex;align-items:center;gap:9px;}
.cstats{display:flex;gap:16px;font-size:12px;color:rgba(255,255,255,.72);}
.cstats strong{color:#fff;font-weight:700;}
.cstats strong.pos{color:#86efac;}
.cstats strong.neg{color:#fca5a5;}
/* Card buttons */
.cb{height:28px;padding:0 12px;border:none;border-radius:6px;cursor:pointer;
  font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;
  font-family:inherit;transition:filter .15s;}
.cb:hover{filter:brightness(1.15);}
.cb-add{background:var(--cyan);color:#fff;}
.cb-del{background:#ef4444;color:#fff;}

/* ─── TABLE ─── */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:900px;}
thead tr{background:var(--blue);}
th{color:#fff;font-size:11px;font-weight:700;padding:9px 10px;
  text-align:center;white-space:nowrap;border-right:1px solid rgba(255,255,255,.15);}
th:last-child{border-right:none;}
td{padding:7px 8px;text-align:center;border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);vertical-align:middle;height:38px;}
td:last-child{border-right:none;}
tbody tr:nth-child(even) td{background:#f8fafc;}
tbody tr:hover td{background:#eff6ff!important;}
/* input cell */
.ci{border:none;background:transparent;text-align:center;width:100%;
  font-size:13px;font-family:inherit;color:var(--inp);font-weight:600;padding:2px 3px;border-radius:3px;}
.ci:focus{outline:2px solid var(--cyan);background:#fff;}
.ci::placeholder{color:#bfdbfe;font-weight:400;}
/* rate input — visually distinct so user knows it's editable */
.ci-rate{border:1.5px solid #bfdbfe;background:#f0f7ff;border-radius:5px;padding:3px 5px;}
/* calc cell */
.cc{background:#eff6ff!important;font-weight:600;}
.pos{color:#15803d;}
.neg{color:#b91c1c;}
/* currency select */
.csel{border:1.5px solid var(--border);background:#eff6ff;font-weight:700;
  font-size:12px;padding:4px 5px;border-radius:6px;cursor:pointer;
  color:var(--navy);font-family:inherit;width:84px;}
.csel:focus{outline:2px solid var(--cyan);}
/* status */
.stbtn{border:none;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;
  cursor:pointer;min-width:80px;font-family:inherit;letter-spacing:.3px;transition:filter .15s;}
.stbtn:hover{filter:brightness(1.08);}
.spaid{background:#dcfce7;color:#15803d;border:1.5px solid #86efac;}
.sunpaid{background:#fee2e2;color:#b91c1c;border:1.5px solid #fca5a5;}
/* delete row */
.xbtn{background:none;border:none;color:#cbd5e1;cursor:pointer;
  font-size:17px;padding:2px 5px;border-radius:4px;line-height:1;}
.xbtn:hover{color:var(--red);background:#fee2e2;}

/* ─── CARD FOOTER ─── */
.cfoot{padding:9px 16px;background:#f8fafc;border-top:2px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;}
.fstats{display:flex;gap:18px;font-size:12px;color:var(--muted);}
.fstats b{color:var(--text);}
.fstats b.pos{color:var(--green);}
.fstats b.neg{color:var(--red);}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--green);color:#fff;
  padding:11px 22px;border-radius:10px;font-weight:700;font-size:13px;
  z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;
  pointer-events:none;box-shadow:0 4px 14px rgba(0,0,0,.2);}
.toast.show{opacity:1;transform:translateY(0);}

/* ─── NEW CONTRA DROPDOWN ─── */
.nm-wrap{position:relative;display:inline-block;}
.nm-menu{display:none;position:absolute;top:38px;left:0;background:#112740;
  border:1px solid rgba(255,255,255,.22);border-radius:9px;z-index:600;
  min-width:168px;box-shadow:0 6px 20px rgba(0,0,0,.55);padding:5px 0;white-space:nowrap;}
.nm-menu.open{display:block;}
.nmitem{padding:8px 16px;color:rgba(255,255,255,.82);font-size:12px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:7px;}
.nmitem:hover{background:rgba(255,255,255,.1);color:#fff;}
.nmitem-sep{height:1px;background:rgba(255,255,255,.1);margin:4px 0;}

/* ─── ADD AREA ─── */
.addarea{text-align:center;padding:8px 0 28px;}
.addbtn{border:2px dashed var(--border);background:transparent;border-radius:10px;
  padding:14px 36px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;
  font-family:inherit;transition:all .2s;}
.addbtn:hover{border-color:var(--cyan);color:var(--cyan);background:#f0f9ff;}

/* ─── RATE BAR ─── */
.rbar{background:#122b47;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.08);}
.rbar-row{display:flex;align-items:center;gap:8px;padding:7px 0;flex-wrap:wrap;}
.rbar-row+.rbar-row{border-top:1px solid rgba(255,255,255,.07);}
.rbar-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.45);
  white-space:nowrap;margin-right:4px;letter-spacing:.5px;min-width:56px;}
.ccy-stat{display:flex;align-items:center;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);border-radius:7px;overflow:hidden;height:34px;}
.ccy-stat-lbl{padding:0 9px;font-size:11px;color:rgba(255,255,255,.5);
  border-right:1px solid rgba(255,255,255,.1);height:100%;display:flex;align-items:center;white-space:nowrap;}
.ccy-stat-val{padding:0 10px;font-size:13px;font-weight:700;color:#fff;white-space:nowrap;}
.ccy-stat-val.zero{color:rgba(255,255,255,.3);}
/* copy buttons */
.cpybtn{height:30px;padding:0 13px;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.8);border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;
  white-space:nowrap;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px;}
.cpybtn:hover{background:rgba(255,255,255,.18);border-color:var(--cyan);color:#fff;}
.cpybtn.btn-acct{border-color:rgba(251,191,36,.4);color:#fbbf24;}
.cpybtn.btn-acct:hover{background:rgba(251,191,36,.12);border-color:#fbbf24;}

@media print{.hdr,.cbar,.rbar,.addarea,.cb,.xbtn,.tab-new,.hbtn,.cfoot .cb{display:none!important;}}
</style>
</head>
<body>

<!-- ─── HEADER ─── -->
<div class="hdr">
  <div class="brand">
    <div class="brand-ico">💱</div>
    <span>CONTRA 记账</span>
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div class="nm-wrap" id="nmWrap">
    <button class="tab-new" onclick="event.stopPropagation();toggleNewMenu()">＋ 新记账 ▾</button>
    <div class="nm-menu" id="newMenu"></div>
  </div>
  <div style="position:relative" id="dlWrap">
    <button class="hbtn hbtn-dl" onclick="event.stopPropagation();toggleDlMenu()">⬇ 下载 ▾</button>
    <div class="dl-menu" id="dlMenu">
      <div class="dlitem" onclick="exportCSV();closeDlMenu()">📊 导出 CSV（可用 Excel 打开）</div>
      <div class="dlitem-sep"></div>
      <div class="dlitem" onclick="window.print();closeDlMenu()">🖨 打印 / 存为 PDF</div>
    </div>
  </div>
  <button class="hbtn hbtn-save" onclick="saveData(true)">💾 保存</button>
</div>

<!-- ─── CONTRA TOOLBAR ─── -->
<div class="cbar">
  <div class="cbar-left">
    <div class="cpill">
      <span class="clbl">日期</span>
      <input type="date" id="hDate" class="cinp" style="width:138px">
    </div>
    <div class="cpill">
      <span class="clbl">MYR / USDT</span>
      <input type="number" id="hUsdt" class="cinp" step="0.001" min="0">
    </div>
  </div>
  <button class="hbtn hbtn-cust" onclick="addCustomer()">＋ 新客户</button>
</div>

<!-- ─── RATE + USDT TRACKER BAR ─── -->
<div class="rbar">
  <div class="rbar-row">
    <span class="rbar-lbl">汇率同步</span>
    <div class="cpill">
      <span class="clbl">USD</span>
      <input type="number" id="grate_USD" class="cinp" step="0.001" min="0" placeholder="4.05" style="width:82px" oninput="setGlobalRate('USD',this.value)">
    </div>
    <div class="cpill">
      <span class="clbl">HKD</span>
      <input type="number" id="grate_HKD" class="cinp" step="0.001" min="0" placeholder="1.91" style="width:82px" oninput="setGlobalRate('HKD',this.value)">
    </div>
    <div class="cpill">
      <span class="clbl">IDR</span>
      <input type="number" id="grate_IDR" class="cinp" step="1" min="0" placeholder="4210" style="width:82px" oninput="setGlobalRate('IDR',this.value)">
    </div>
    <div class="cpill">
      <span class="clbl">THB</span>
      <input type="number" id="grate_THB" class="cinp" step="0.01" min="0" placeholder="8.10" style="width:82px" oninput="setGlobalRate('THB',this.value)">
    </div>
  </div>
  <div class="rbar-row">
    <span class="rbar-lbl">结算 USDT</span>
    <div class="ccy-stat">
      <span class="ccy-stat-lbl">💵 USD</span>
      <span class="ccy-stat-val zero" id="ccyUsdt_USD">—</span>
    </div>
    <div class="ccy-stat">
      <span class="ccy-stat-lbl">🇭🇰 HKD</span>
      <span class="ccy-stat-val zero" id="ccyUsdt_HKD">—</span>
    </div>
    <div class="ccy-stat">
      <span class="ccy-stat-lbl">🇮🇩 IDR</span>
      <span class="ccy-stat-val zero" id="ccyUsdt_IDR">—</span>
    </div>
    <div class="ccy-stat">
      <span class="ccy-stat-lbl">🇹🇭 THB</span>
      <span class="ccy-stat-val zero" id="ccyUsdt_THB">—</span>
    </div>
    <div style="margin-left:auto;display:flex;gap:7px;flex-shrink:0;">
      <button class="cpybtn" onclick="copyDeduct()">📋 复制扣款</button>
      <button class="cpybtn btn-acct" onclick="copyAccount()">📋 复制户口</button>
    </div>
  </div>
</div>

<!-- ─── SUMMARY BAR ─── -->
<div class="sumbar">
  <div class="stile"><span class="slbl">Total MYR</span><span class="sval" id="sTotalMYR">—</span></div>
  <div class="stile"><span class="slbl">MYR / USDT</span><span class="sval" id="sRate">—</span></div>
  <div class="stile">
    <span class="slbl">Handover USDT <small style="text-transform:none;font-weight:400">(PAID)</small></span>
    <span class="sval amber" id="sHandover">—</span>
  </div>
  <div class="stile"><span class="slbl">Profit (USDT)</span><span class="sval" id="sProfit">—</span></div>
</div>

<!-- ─── CUSTOMERS ─── -->
<div class="main" id="custCont"></div>
<div class="addarea">
  <button class="addbtn" onclick="addCustomer()">＋ 添加新客户</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
//  STATE
// ============================================================
let G = {
  contras: [],
  currentId: null,
  usdtRates: { HKD:'', IDR:'', THB:'' },
  rates: { HKD:'', IDR:'', THB:'', USD:'' }
};
let ctraId=1, custId=1, txId=1;
let G_ccyTotals={USD:0,HKD:0,IDR:0,THB:0}; // live per-currency USDT (PAID only)

function cur(){ return G.contras.find(c=>c.id===G.currentId)||null; }
function getC(id){ const ct=cur(); return ct&&ct.customers.find(c=>c.id===id); }
function getT(c,id){ return c&&c.txs.find(t=>t.id===id); }

// ============================================================
//  CALC
// ============================================================
function parseNum(v){ return parseFloat(String(v||'').replace(/,/g,''))||0; }
function calcMYR(ccy,amt,rate){
  const a=parseNum(amt),r=parseNum(rate); if(!r) return 0;
  return ccy==='USD'?a*r:a/r;
}
function calcUSDT(ccy,amt,ur){
  const a=parseNum(amt); if(ccy==='USD') return a;
  const u=parseNum(ur); return u?a/u:0;
}
function calcProfit(myr,usdt){
  const ct=cur(); const g=+(ct&&ct.usdtRate)||1;
  return myr/g-usdt;
}
function fmt(n,d=2){
  if(isNaN(n)||n===null) return '—';
  return n.toLocaleString('en-MY',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function cls(n){ return n>0.005?'pos':n<-0.005?'neg':''; }

// ============================================================
//  FACTORIES
// ============================================================
function newTx(ccy){
  ccy=ccy||'USD';
  return {id:txId++, ccy, amt:'', rate:(G.rates&&G.rates[ccy])||'', usdtRate:(ccy!=='USD'&&G.usdtRates[ccy])||'', status:'UNPAID', note:''};
}
function newCust(name){
  const c={id:custId++, name:name||'新客户', txs:[]};
  ['HKD','IDR','THB','USD'].forEach(cc=>c.txs.push(newTx(cc)));
  return c;
}
function newContra(name,date,rate){
  return {id:ctraId++, name:name||'Contra '+ctraId, date:date||today(), usdtRate:rate||4.02, customers:[]};
}
function today(){ return new Date().toISOString().slice(0,10); }

// ============================================================
//  PERSIST
// ============================================================
function saveData(msg){
  localStorage.setItem('contra6',JSON.stringify({G,ctraId,custId,txId}));
  if(msg) toast('✓ 已保存');
}
function loadData(){
  try{
    const d=JSON.parse(localStorage.getItem('contra6'));
    if(!d||!d.G) return false;
    G=d.G; ctraId=d.ctraId||1; custId=d.custId||1; txId=d.txId||1;
    if(!G.usdtRates) G.usdtRates={HKD:'',IDR:'',THB:''};
    if(!G.rates) G.rates={HKD:'',IDR:'',THB:'',USD:''};
    if(!G.contras||!G.contras.length) return false;
    G.contras.forEach(ct=>{
      if(ct.id>=ctraId) ctraId=ct.id+1;
      (ct.customers||[]).forEach(c=>{
        if(c.id>=custId) custId=c.id+1;
        (c.txs||[]).forEach(t=>{ if(t.id>=txId) txId=t.id+1; });
      });
    });
    if(!G.contras.find(c=>c.id===G.currentId)) G.currentId=G.contras[0].id;
    return true;
  }catch(e){ return false; }
}
let sv;
function sched(){ clearTimeout(sv); sv=setTimeout(()=>saveData(false),800); }

// ============================================================
//  RENDER
// ============================================================
function render(){ renderTabs(); renderContra(); }

function renderTabs(){
  // Render tab buttons inside tab-bar
  document.getElementById('tabBar').innerHTML =
    G.contras.map(ct=>`
      <div class="tab${ct.id===G.currentId?' active':''}" id="tab${ct.id}" onclick="switchContra(${ct.id})">
        <input class="tab-name" value="${esc(ct.name)}" readonly
          onclick="event.stopPropagation();switchContra(${ct.id});"
          ondblclick="event.stopPropagation();this.removeAttribute('readonly');this.select();"
          onblur="this.setAttribute('readonly','readonly');renameContra(${ct.id},this.value);"
          onkeydown="if(event.key==='Enter'){this.blur();}">
        <button class="tab-x" onclick="event.stopPropagation();delContra(${ct.id});">×</button>
      </div>`).join('');
  // Render copy-from menu (outside tab-bar to avoid overflow clipping)
  const copyItems = G.contras.length
    ? `<div class="nmitem-sep"></div>`
      + G.contras.map(ct=>`<div class="nmitem" onclick="addContra(${ct.id});closeNewMenu()">📋 复制自 ${esc(ct.name)}</div>`).join('')
    : '';
  document.getElementById('newMenu').innerHTML =
    `<div class="nmitem" onclick="addContra(null);closeNewMenu()">✦ 空白新记账</div>${copyItems}`;
}

function renderContra(){
  const ct=cur();
  // Update toolbar
  document.getElementById('hDate').value = ct?ct.date:'';
  document.getElementById('hUsdt').value = ct?ct.usdtRate:'';
  // Update global rate inputs
  ['USD','HKD','IDR','THB'].forEach(ccy=>{ const el=document.getElementById('grate_'+ccy); if(el) el.value=G.rates[ccy]||''; });
  // Render customers
  const cont=document.getElementById('custCont');
  if(!ct){
    cont.innerHTML='<div style="text-align:center;padding:50px 20px;color:var(--muted);font-size:15px;">请点击上方创建一个新记账</div>';
    updateSummary(); return;
  }
  cont.innerHTML=(ct.customers||[]).map(c=>renderCust(c)).join('');
  updateSummary();
}

function renderCust(c){
  let m=0,u=0,p=0;
  c.txs.forEach(t=>{ const mm=calcMYR(t.ccy,t.amt,t.rate); const uu=calcUSDT(t.ccy,t.amt,t.usdtRate); m+=mm; u+=uu; p+=calcProfit(mm,uu); });
  const mc=cls(m),pc=cls(p);
  return `
<div class="card" id="c${c.id}">
  <div class="chdr">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:20px">👤</span>
      <input class="cname" value="${esc(c.name)}" onchange="setCustName(${c.id},this.value)" placeholder="客户名称">
    </div>
    <div class="chdr-right">
      <div class="cstats" id="cm${c.id}">
        <span>MYR: <strong class="${mc}">${fmt(m)}</strong></span>
        <span>USDT: <strong>${fmt(u)}</strong></span>
        <span>Profit: <strong class="${pc}">${fmt(p)} USDT</strong></span>
      </div>
      <button class="cb cb-add" onclick="addTxRow(${c.id})">＋ 行</button>
      <button class="cb cb-del" onclick="delCust(${c.id})">✕</button>
    </div>
  </div>
  <div class="tw">
    <table>
      <thead><tr>
        <th style="width:88px">货币</th>
        <th style="width:132px">AMOUNT</th>
        <th style="width:108px">RATE</th>
        <th style="width:132px">BALANCE (MYR)</th>
        <th style="width:108px">USDT RATE</th>
        <th style="width:120px">TOTAL USDT</th>
        <th style="width:115px">PROFIT (USDT)</th>
        <th style="width:96px">STATUS</th>
        <th style="width:32px"></th>
      </tr></thead>
      <tbody id="tb${c.id}">${c.txs.map(t=>renderRow(t,c.id)).join('')}</tbody>
    </table>
  </div>
  <div class="cfoot">
    <div class="fstats" id="fs${c.id}">
      <span>小计 MYR: <b class="${mc}">${fmt(m)}</b></span>
      <span>USDT: <b>${fmt(u)}</b></span>
      <span>Profit: <b class="${pc}">${fmt(p)} USDT</b></span>
    </div>
    <button class="cb cb-add" style="height:26px;font-size:11px" onclick="addTxRow(${c.id})">＋ 行</button>
  </div>
</div>`;
}

function renderRow(t,cId){
  const m=calcMYR(t.ccy,t.amt,t.rate);
  const u=calcUSDT(t.ccy,t.amt,t.usdtRate);
  const p=calcProfit(m,u);
  const has=t.amt&&t.rate;
  const rph=t.ccy==='USD'?'4.05':t.ccy==='HKD'?'1.91':t.ccy==='IDR'?'4210':'8.10';
  const uCell=t.ccy==='USD'
    ?`<span style="color:#94a3b8;font-size:11px">1 : 1</span>`
    :`<input class="ci" id="ur${t.id}" value="${esc(t.usdtRate)}"
        oninput="setUR(${cId},${t.id},'${t.ccy}',this.value)"
        placeholder="e.g. 7.77" style="width:100%">`;
  return `<tr id="t${t.id}">
  <td><select class="csel" onchange="setCcy(${cId},${t.id},this.value)">
    <option value="USD" ${t.ccy==='USD'?'selected':''}>💵 USD</option>
    <option value="HKD" ${t.ccy==='HKD'?'selected':''}>🇭🇰 HKD</option>
    <option value="IDR" ${t.ccy==='IDR'?'selected':''}>🇮🇩 IDR</option>
    <option value="THB" ${t.ccy==='THB'?'selected':''}>🇹🇭 THB</option>
  </select></td>
  <td><input class="ci" value="${esc(t.amt)}" oninput="sf(${cId},${t.id},'amt',this.value)" placeholder="0.00" style="width:100%"></td>
  <td><input class="ci ci-rate" id="rt${t.id}" value="${esc(t.rate)}" oninput="sf(${cId},${t.id},'rate',this.value)" placeholder="${rph}" style="width:100%" title="${t.ccy==='USD'?'MYR per USD (×)':'FCY per MYR (÷)'}"></td>
  <td class="cc ${cls(m)}" id="myr${t.id}">${has?fmt(m):'—'}</td>
  <td>${uCell}</td>
  <td class="cc" id="usdt${t.id}">${t.amt?fmt(u):'—'}</td>
  <td class="cc ${cls(p)}" id="prf${t.id}">${has?fmt(p):'—'}</td>
  <td><button class="stbtn ${t.status==='PAID'?'spaid':'sunpaid'}" id="st${t.id}" onclick="toggleSt(${cId},${t.id})">${t.status}</button></td>
  <td><button class="xbtn" onclick="delRow(${cId},${t.id})">✕</button></td>
</tr>`;
}

// ============================================================
//  EFFICIENT DOM UPDATES
// ============================================================
function refreshRow(cId,tId){
  const c=getC(cId); const t=getT(c,tId); if(!t) return;
  const m=calcMYR(t.ccy,t.amt,t.rate);
  const u=calcUSDT(t.ccy,t.amt,t.usdtRate);
  const p=calcProfit(m,u);
  const has=t.amt&&t.rate;
  const em=document.getElementById('myr'+tId);
  const eu=document.getElementById('usdt'+tId);
  const ep=document.getElementById('prf'+tId);
  if(em){em.textContent=has?fmt(m):'—';em.className='cc '+cls(m);}
  if(eu) eu.textContent=t.amt?fmt(u):'—';
  if(ep){ep.textContent=has?fmt(p):'—';ep.className='cc '+cls(p);}
  refreshCard(cId); updateSummary();
}

function refreshCard(cId){
  const c=getC(cId); if(!c) return;
  let m=0,u=0,p=0;
  c.txs.forEach(t=>{ const mm=calcMYR(t.ccy,t.amt,t.rate); const uu=calcUSDT(t.ccy,t.amt,t.usdtRate); m+=mm; u+=uu; if(t.status==='PAID') p+=calcProfit(mm,uu); });
  const mc=cls(m),pc=cls(p);
  const cm=document.getElementById('cm'+cId);
  if(cm) cm.innerHTML=`<span>MYR: <strong class="${mc}">${fmt(m)}</strong></span><span>USDT: <strong>${fmt(u)}</strong></span><span>Profit: <strong class="${pc}">${fmt(p)} USDT</strong></span>`;
  const fs=document.getElementById('fs'+cId);
  if(fs) fs.innerHTML=`<span>小计 MYR: <b class="${mc}">${fmt(m)}</b></span><span>USDT: <b>${fmt(u)}</b></span><span>Profit: <b class="${pc}">${fmt(p)} USDT</b></span>`;
}

function updateSummary(){
  const ct=cur();
  if(!ct){
    ['sTotalMYR','sHandover','sProfit'].forEach(id=>{ const el=document.getElementById(id); if(el){el.textContent='—';el.className='sval';} });
    ['USD','HKD','IDR','THB'].forEach(ccy=>{ const el=document.getElementById('ccyUsdt_'+ccy); if(el){el.textContent='—';el.className='ccy-stat-val zero';} });
    return;
  }
  let totMYR=0,handover=0,profit=0;
  const ccyTotals={USD:0,HKD:0,IDR:0,THB:0};
  (ct.customers||[]).forEach(c=>c.txs.forEach(t=>{
    const m=calcMYR(t.ccy,t.amt,t.rate); const u=calcUSDT(t.ccy,t.amt,t.usdtRate);
    totMYR+=m;
    if(t.status==='PAID'){
      ccyTotals[t.ccy]=(ccyTotals[t.ccy]||0)+u;
      handover+=u; profit+=calcProfit(m,u);
    }
  }));
  setSE('sTotalMYR',fmt(totMYR),cls(totMYR));
  document.getElementById('sRate').textContent=fmt(+ct.usdtRate||0,3);
  setSE('sHandover',fmt(handover),'amber');
  setSE('sProfit',fmt(profit)+' USDT',cls(profit));
  // Store in global for copy functions, then update UI
  G_ccyTotals={USD:ccyTotals.USD,HKD:ccyTotals.HKD,IDR:ccyTotals.IDR,THB:ccyTotals.THB};
  ['USD','HKD','IDR','THB'].forEach(ccy=>{
    const el=document.getElementById('ccyUsdt_'+ccy); if(!el) return;
    const v=ccyTotals[ccy]||0;
    el.textContent = v>0.005 ? fmt(v)+' USDT' : '—';
    el.className = 'ccy-stat-val'+(v<0.005?' zero':'');
  });
}
function setSE(id,txt,extra){
  const el=document.getElementById(id); if(!el) return;
  el.textContent=txt; el.className='sval'+(extra?' '+extra:'');
}

// ============================================================
//  CONTRA ACTIONS
// ============================================================
function addContra(fromId){
  const last=G.contras[G.contras.length-1];
  const n=G.contras.length+1;
  const ct=newContra('Contra '+n, today(), last?last.usdtRate:4.02);
  // Copy customers from selected source contra (username + currencies only, no amounts)
  const src = fromId!=null ? G.contras.find(c=>c.id===fromId) : null;
  if(src&&src.customers&&src.customers.length){
    src.customers.forEach(prev=>{
      const c={id:custId++, name:prev.name, txs:[]};
      // Copy exact same currencies in same order, but empty amounts
      prev.txs.forEach(pt=>c.txs.push(newTx(pt.ccy)));
      ct.customers.push(c);
    });
  }
  G.contras.push(ct);
  G.currentId=ct.id;
  render(); sched();
}
function toggleNewMenu(){
  const m=document.getElementById('newMenu'); if(!m) return;
  m.classList.toggle('open');
}
function closeNewMenu(){
  const m=document.getElementById('newMenu'); if(m) m.classList.remove('open');
}
function switchContra(id){ if(G.currentId===id) return; G.currentId=id; render(); }
function delContra(id){
  if(G.contras.length<=1){ toast('⚠ 至少保留一个记账'); return; }
  G.contras=G.contras.filter(c=>c.id!==id);
  if(G.currentId===id) G.currentId=G.contras[0].id;
  render(); saveData(false); toast('已删除记账');
}
function renameContra(id,name){
  const ct=G.contras.find(c=>c.id===id); if(ct) ct.name=name; sched();
}
function onDate(val){ const ct=cur(); if(!ct) return; ct.date=val; sched(); }
function onRate(val){
  const ct=cur(); if(!ct) return;
  ct.usdtRate=parseFloat(val)||4.02;
  (ct.customers||[]).forEach(c=>{
    c.txs.forEach(t=>{
      const p=calcProfit(calcMYR(t.ccy,t.amt,t.rate),calcUSDT(t.ccy,t.amt,t.usdtRate));
      const el=document.getElementById('prf'+t.id);
      if(el){el.textContent=(t.amt&&t.rate)?fmt(p):'—';el.className='cc '+cls(p);}
    });
    refreshCard(c.id);
  });
  document.getElementById('sRate').textContent=fmt(ct.usdtRate,3);
  updateSummary(); sched();
}

// ============================================================
//  CUSTOMER / TX ACTIONS
// ============================================================
function addCustomer(){
  const ct=cur(); if(!ct) return;
  const c=newCust();
  ct.customers.push(c);
  const cont=document.getElementById('custCont');
  const tmp=document.createElement('div');
  tmp.innerHTML=renderCust(c);
  cont.appendChild(tmp.firstElementChild);
  updateSummary(); sched();
  setTimeout(()=>{ const el=document.getElementById('c'+c.id); if(el) el.querySelector('.cname').focus(); },50);
}
function delCust(id){
  const ct=cur(); if(!ct) return;
  ct.customers=ct.customers.filter(c=>c.id!==id);
  const el=document.getElementById('c'+id); if(el) el.remove();
  updateSummary(); saveData(false); toast('已删除客户');
}
function setCustName(id,name){ const c=getC(id); if(c) c.name=name; sched(); }

function sf(cId,tId,field,val){
  const c=getC(cId); const t=getT(c,tId); if(!t) return;
  // Strip commas from numeric fields (handles pasted values like "1,894.50")
  if(field==='amt'||field==='rate') val=val.replace(/,/g,'');
  t[field]=val; refreshRow(cId,tId); sched();
}

function setUR(cId,tId,ccy,val){
  G.usdtRates[ccy]=val;
  const ct=cur(); if(!ct) return;
  (ct.customers||[]).forEach(c=>c.txs.forEach(t=>{
    if(t.ccy===ccy&&t.ccy!=='USD'){
      t.usdtRate=val;
      if(t.id!==tId){ const inp=document.getElementById('ur'+t.id); if(inp) inp.value=val; }
      refreshRow(c.id,t.id);
    }
  }));
  sched();
}

function setGlobalRate(ccy,val){
  G.rates[ccy]=val;
  const ct=cur(); if(!ct) return;
  (ct.customers||[]).forEach(c=>c.txs.forEach(t=>{
    if(t.ccy===ccy){
      t.rate=val;
      const inp=document.getElementById('rt'+t.id); if(inp) inp.value=val;
      refreshRow(c.id,t.id);
    }
  }));
  sched();
}

function setCcy(cId,tId,ccy){
  const c=getC(cId); const t=getT(c,tId); if(!t) return;
  t.ccy=ccy; t.usdtRate=(ccy!=='USD'&&G.usdtRates[ccy])||'';
  t.rate=(G.rates&&G.rates[ccy])||'';
  const el=document.getElementById('t'+tId);
  if(el){ const tmp=document.createElement('tbody'); tmp.innerHTML=renderRow(t,cId); el.replaceWith(tmp.firstElementChild); }
  refreshCard(cId); updateSummary(); sched();
}

function toggleSt(cId,tId){
  const c=getC(cId); const t=getT(c,tId); if(!t) return;
  t.status=t.status==='PAID'?'UNPAID':'PAID';
  const btn=document.getElementById('st'+tId);
  if(btn){btn.textContent=t.status;btn.className='stbtn '+(t.status==='PAID'?'spaid':'sunpaid');}
  refreshCard(cId); updateSummary(); sched();
}

function addTxRow(cId){
  const ct=cur(); if(!ct) return;
  const c=ct.customers.find(c=>c.id===cId); if(!c) return;
  const t=newTx('USD'); c.txs.push(t);
  const tb=document.getElementById('tb'+cId);
  if(tb){ const tmp=document.createElement('tbody'); tmp.innerHTML=renderRow(t,cId); tb.appendChild(tmp.firstElementChild); }
  refreshCard(cId); sched();
}

function delRow(cId,tId){
  const ct=cur(); if(!ct) return;
  const c=ct.customers.find(c=>c.id===cId); if(!c) return;
  if(c.txs.length<=1){ toast('⚠ 至少保留一行'); return; }
  c.txs=c.txs.filter(t=>t.id!==tId);
  const el=document.getElementById('t'+tId); if(el) el.remove();
  refreshCard(cId); updateSummary(); sched();
}

function copyDeduct(){
  // Order: IDR, THB, HKD, USD — skip if value <= 0
  const order=['IDR','THB','HKD','USD'];
  const lines=order
    .filter(ccy=>G_ccyTotals[ccy]>0.005)
    .map(ccy=>`${fmt(G_ccyTotals[ccy])} USDT 扣 ${ccy}`);
  if(!lines.length){ toast('⚠ 没有 PAID 结算数据'); return; }
  navigator.clipboard.writeText(lines.join('\n'))
    .then(()=>toast('✓ 已复制扣款公式'))
    .catch(()=>{ /* fallback */ const ta=document.createElement('textarea'); ta.value=lines.join('\n'); document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); toast('✓ 已复制扣款公式'); });
}

function copyAccount(){
  let big=0, small=0;
  ['USD','HKD','IDR','THB'].forEach(ccy=>{
    const v=G_ccyTotals[ccy]||0;
    if(v>2000) big+=v;
    else if(v>0.005) small+=v;
  });
  if(big<0.005&&small<0.005){ toast('⚠ 没有 PAID 结算数据'); return; }
  const lines=[
    '请帮忙安排USDT地址',
    '',
    `大户口 ： ${big>0.005?fmt(big)+' USDT':'—'}`,
    `小户口 ： ${small>0.005?fmt(small)+' USDT':'—'}`
  ];
  const text=lines.join('\n');
  navigator.clipboard.writeText(text)
    .then(()=>toast('✓ 已复制户口安排'))
    .catch(()=>{ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); toast('✓ 已复制户口安排'); });
}

let tt;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),2500); }

// ============================================================
//  EXPORT CSV
// ============================================================
function exportCSV(){
  const ct=cur(); if(!ct){ toast('⚠ 请先选择记账'); return; }
  const rows=[];
  // Header info
  rows.push(['记账名称','日期','MYR/USDT汇率']);
  rows.push([ct.name, ct.date, ct.usdtRate]);
  rows.push([]);
  // Column headers
  rows.push(['客户','货币','金额(Amount)','汇率(Rate)','Balance(MYR)','USDT汇率','Total USDT','Profit(USDT)','状态(Status)']);
  // Data rows
  (ct.customers||[]).forEach(c=>{
    c.txs.forEach(t=>{
      const m=calcMYR(t.ccy,t.amt,t.rate);
      const u=calcUSDT(t.ccy,t.amt,t.usdtRate);
      const p=calcProfit(m,u);
      const has=t.amt&&t.rate;
      rows.push([
        c.name,
        t.ccy,
        t.amt||'',
        t.rate||'',
        has ? m.toFixed(2) : '',
        t.ccy==='USD' ? '1:1' : (t.usdtRate||''),
        t.amt ? u.toFixed(2) : '',
        has ? p.toFixed(2) : '',
        t.status
      ]);
    });
    rows.push([]); // blank row between customers
  });
  // Summary
  let totMYR=0,handover=0,profit=0;
  (ct.customers||[]).forEach(c=>c.txs.forEach(t=>{
    const m=calcMYR(t.ccy,t.amt,t.rate); const u=calcUSDT(t.ccy,t.amt,t.usdtRate);
    totMYR+=m; if(t.status==='PAID'){ handover+=u; profit+=calcProfit(m,u); }
  }));
  rows.push(['汇总','','','','Total MYR: '+totMYR.toFixed(2),'','Handover USDT(PAID): '+handover.toFixed(2),'Profit(USDT): '+profit.toFixed(2),'']);

  const csv=rows.map(r=>r.map(cell=>`"${String(cell??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`${ct.name}_${ct.date}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('✓ CSV 已下载');
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
